<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔫 TomatiK Strike CS2 - Dust 2</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:Arial;user-select:none;touch-action:manipulation;height:100vh;cursor:none}
        canvas{display:block}
        
        .crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:#00ff00;border-radius:50%;pointer-events:none;z-index:20;box-shadow:0 0 10px #00ff00,0 0 20px #00ff00}
        
        .ui-top{position:fixed;top:15px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;display:flex;gap:30px;color:white;font-size:18px;text-shadow:0 0 10px rgba(0,0,0,0.8)}
        .money-ui{position:fixed;top:15px;right:15px;z-index:10;pointer-events:none;color:#00ff00;font-size:20px;font-weight:bold;text-shadow:0 0 10px rgba(0,0,0,0.8)}
        .ammo-ui{position:fixed;bottom:30px;right:30px;z-index:10;pointer-events:none;color:white;font-size:22px;text-shadow:0 0 10px rgba(0,0,0,0.8)}
        .weapon-ui{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none;color:white;font-size:16px;text-shadow:0 0 10px rgba(0,0,0,0.8)}
        .health-ui{position:fixed;bottom:60px;left:30px;z-index:10;pointer-events:none;color:#ff4444;font-size:20px;text-shadow:0 0 10px rgba(0,0,0,0.8)}
        
        .buy-menu{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:50;display:none;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;padding:20px}
        .buy-menu.show{display:flex}
        .buy-item{width:100px;height:80px;background:rgba(255,255,255,0.1);border:2px solid #555;border-radius:10px;color:white;text-align:center;cursor:pointer;font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
        .buy-item:hover,.buy-item:active{background:rgba(0,255,0,0.2);border-color:#0f0}
        .buy-item .icon{font-size:30px}
        .buy-item .price{color:#0f0;font-size:11px}
        .buy-close{position:absolute;top:20px;right:20px;color:white;font-size:24px;cursor:pointer;background:none;border:none}
        
        .killfeed{position:fixed;top:60px;right:20px;z-index:10;pointer-events:none;color:white;font-size:14px}
        .killfeed div{animation:fade 3s forwards;margin:3px 0}
        @keyframes fade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
        
        .mobile-btns{position:fixed;bottom:20px;left:0;right:0;z-index:30;display:flex;justify-content:center;gap:15px;pointer-events:none}
        .m-btn{width:55px;height:55px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);color:white;font-size:20px;display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer}
        .m-btn:active{background:rgba(0,255,0,0.5)}
    </style>
</head>
<body>

<div class="crosshair" id="crosshair"></div>

<div class="ui-top">
    <span id="ctScore">CT: 0</span>
    <span id="tScore">T: 0</span>
</div>
<div class="money-ui" id="moneyUI">$800</div>
<div class="ammo-ui" id="ammoUI">12/24</div>
<div class="weapon-ui" id="weaponUI">🔫 USP-S</div>
<div class="health-ui" id="healthUI">❤️ 100</div>

<div class="buy-menu" id="buyMenu">
    <button class="buy-close" onclick="closeBuyMenu()">✕</button>
    <div class="buy-item" onclick="buyWeapon('usp')"><span class="icon">🔫</span>USP-S<span class="price">$0</span></div>
    <div class="buy-item" onclick="buyWeapon('ak')"><span class="icon">🔫</span>AK-47<span class="price">$2700</span></div>
    <div class="buy-item" onclick="buyWeapon('m4')"><span class="icon">🔫</span>M4A4<span class="price">$3100</span></div>
    <div class="buy-item" onclick="buyWeapon('awp')"><span class="icon">🔭</span>AWP<span class="price">$4750</span></div>
    <div class="buy-item" onclick="buyWeapon('deagle')"><span class="icon">🔫</span>Deagle<span class="price">$700</span></div>
    <div class="buy-item" onclick="buyWeapon('p90')"><span class="icon">🔫</span>P90<span class="price">$2350</span></div>
    <div class="buy-item" onclick="buyWeapon('knife')"><span class="icon">🔪</span>Нож<span class="price">$0</span></div>
</div>

<div class="killfeed" id="killfeed"></div>

<div class="mobile-btns" id="mobileBtns">
    <button class="m-btn" onclick="openBuyMenu()">🛒</button>
    <button class="m-btn" id="shootBtn" ontouchstart="startShooting()" ontouchend="stopShooting()">🔫</button>
    <button class="m-btn" onclick="reload()">🔄</button>
</div>

<script>
// === СОСТОЯНИЕ ===
let money=800,weapon='usp',ammo=12,maxAmmo=24,canShoot=true,health=100,gameActive=true;
let ctScore=0,tScore=0;
let enemies=[],particles=[],walls=[];
let mouseX=window.innerWidth/2,mouseY=window.innerHeight/2;
let moveForward=false,moveBack=false,moveLeft=false,moveRight=false;

// Оружие
const weapons={
    usp:{name:'USP-S',ammo:12,maxAmmo:24,damage:35,fireRate:150,price:0},
    ak:{name:'AK-47',ammo:30,maxAmmo:90,damage:36,fireRate:100,price:2700},
    m4:{name:'M4A4',ammo:30,maxAmmo:90,damage:33,fireRate:90,price:3100},
    awp:{name:'AWP',ammo:5,maxAmmo:15,damage:115,fireRate:1500,price:4750},
    deagle:{name:'Deagle',ammo:7,maxAmmo:35,damage:70,fireRate:400,price:700},
    p90:{name:'P90',ammo:50,maxAmmo:100,damage:26,fireRate:70,price:2350},
    knife:{name:'Нож',ammo:1,maxAmmo:1,damage:50,fireRate:300,price:0}
};

// === THREE.JS ===
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87CEEB);
scene.fog=new THREE.Fog(0xC8A96E,50,150);

const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,1.7,-15);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.body.appendChild(renderer.domElement);

// Освещение
scene.add(new THREE.AmbientLight(0x8899aa,0.5));
const sunLight=new THREE.DirectionalLight(0xffeedd,1.5);
sunLight.position.set(30,40,20);
sunLight.castShadow=true;
sunLight.shadow.mapSize.width=2048;
sunLight.shadow.mapSize.height=2048;
sunLight.shadow.camera.near=0.5;
sunLight.shadow.camera.far=200;
scene.add(sunLight);

// Земля
const groundGeom=new THREE.PlaneGeometry(100,100);
const groundMat=new THREE.MeshStandardMaterial({color:0xC8A96E,roughness:0.9});
const ground=new THREE.Mesh(groundGeom,groundMat);
ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;
scene.add(ground);

// Стены (коллизия)
const wallMat=new THREE.MeshStandardMaterial({color:0xA08060,roughness:0.8});

function createWall(x,y,z,w,h,d){
    let wall=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),wallMat);
    wall.position.set(x,y,z);
    wall.castShadow=true;
    wall.receiveShadow=true;
    scene.add(wall);
    walls.push({mesh:wall,box:new THREE.Box3().setFromObject(wall)});
}

createWall(0,2.5,-20,20,5,0.5);
createWall(0,2.5,20,20,5,0.5);
createWall(-15,2.5,0,0.5,5,30);
createWall(15,2.5,0,0.5,5,30);
createWall(-5,1.5,-10,3,3,3);
createWall(5,1.5,10,3,3,3);
createWall(-8,1.5,15,2,3,2);
createWall(8,1.5,-15,2,3,2);

// ВИДИМЫЙ ПЕРСОНАЖ (руки/тело)
const playerBody=new THREE.Group();
// Тело
const bodyMesh=new THREE.Mesh(new THREE.CapsuleGeometry(0.3,1.2,4,8),new THREE.MeshStandardMaterial({color:0x3355aa}));
bodyMesh.position.y=0.9;
bodyMesh.castShadow=true;
playerBody.add(bodyMesh);
// Голова
const headMesh=new THREE.Mesh(new THREE.SphereGeometry(0.2,8,8),new THREE.MeshStandardMaterial({color:0xffcc99}));
headMesh.position.y=1.8;
playerBody.add(headMesh);
playerBody.position.copy(camera.position);
playerBody.position.y-=1.7;
scene.add(playerBody);

// Оружие в руках
const gunGroup=new THREE.Group();
gunGroup.position.set(0.3,-0.3,-0.7);
camera.add(gunGroup);
scene.add(camera);

function updateGunModel(){
    gunGroup.clear();
    let color=0x333333;
    if(weapon==='ak')color=0x4a2800;
    if(weapon==='m4')color=0x1a1a1a;
    if(weapon==='awp')color=0x1a4a00;
    if(weapon==='deagle')color=0x444444;
    if(weapon==='p90')color=0x222244;
    if(weapon==='knife'){let k=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.3,0.02),new THREE.MeshStandardMaterial({color:0xcccccc}));gunGroup.add(k);return;}
    let body=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.2,0.5),new THREE.MeshStandardMaterial({color:color}));
    gunGroup.add(body);
}
updateGunModel();

// === УПРАВЛЕНИЕ ===
document.addEventListener('mousemove',e=>{
    mouseX=e.clientX;mouseY=e.clientY;
    let cx=(e.clientX/window.innerWidth)*2-1;
    let cy=-(e.clientY/window.innerHeight)*2+1;
    camera.rotation.y+=cx*0.003;
    camera.rotation.x=Math.max(-0.8,Math.min(0.5,camera.rotation.x+cy*0.002));
});

document.addEventListener('touchmove',e=>{
    e.preventDefault();
    mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;
    let cx=(e.touches[0].clientX/window.innerWidth)*2-1;
    let cy=-(e.touches[0].clientY/window.innerHeight)*2+1;
    camera.rotation.y+=cx*0.005;
    camera.rotation.x=Math.max(-0.8,Math.min(0.5,camera.rotation.x+cy*0.003));
});

// Стрельба
document.addEventListener('click',()=>{if(gameActive)shoot();});
document.addEventListener('touchstart',e=>{e.preventDefault();if(gameActive)shoot();});

let shootInterval;
function startShooting(){shoot();shootInterval=setInterval(shoot,weapons[weapon].fireRate);}
function stopShooting(){clearInterval(shootInterval);}

function shoot(){
    if(!canShoot||ammo<=0)return;
    ammo--;canShoot=false;
    updateUI();
    
    let flash=new THREE.PointLight(0xffaa00,2,5);
    flash.position.copy(gunGroup.position).add(new THREE.Vector3(0,0,-0.5));
    camera.add(flash);
    setTimeout(()=>camera.remove(flash),50);
    
    let hit=false;
    for(let i=enemies.length-1;i>=0;i--){
        let e=enemies[i];
        let screenPos=e.position.clone().project(camera);
        let sx=(screenPos.x+1)/2*window.innerWidth;
        let sy=(-screenPos.y+1)/2*window.innerHeight;
        let dist=Math.hypot(sx-mouseX,sy-mouseY);
        if(dist<80&&camera.position.distanceTo(e.position)<30){
            e.health-=weapons[weapon].damage;
            hit=true;
            if(e.health<=0){
                createExplosion(e.position.clone());
                scene.remove(e.mesh);
                enemies.splice(i,1);
                money+=300;
                ctScore++;
                addKillfeed('☠️ Вы убили врага');
                if(enemies.length===0)spawnWave();
            }
            break;
        }
    }
    
    try{new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=').play();}catch(e){}
    setTimeout(()=>canShoot=true,weapons[weapon].fireRate);
    updateUI();
}

// Клавиатура
document.addEventListener('keydown',e=>{
    if(e.key==='b'||e.key==='B')openBuyMenu();
    if(e.key==='r'||e.key==='R')reload();
    if(e.key==='w'||e.key==='ArrowUp')moveForward=true;
    if(e.key==='s'||e.key==='ArrowDown')moveBack=true;
    if(e.key==='a'||e.key==='ArrowLeft')moveLeft=true;
    if(e.key==='d'||e.key==='ArrowRight')moveRight=true;
});
document.addEventListener('keyup',e=>{
    if(e.key==='w'||e.key==='ArrowUp')moveForward=false;
    if(e.key==='s'||e.key==='ArrowDown')moveBack=false;
    if(e.key==='a'||e.key==='ArrowLeft')moveLeft=false;
    if(e.key==='d'||e.key==='ArrowRight')moveRight=false;
});

function reload(){
    if(ammo===weapons[weapon].ammo)return;
    ammo=weapons[weapon].ammo;
    maxAmmo-=weapons[weapon].ammo;
    if(maxAmmo<0)maxAmmo=0;
    updateUI();
}

function buyWeapon(w){
    if(money>=weapons[w].price){
        money-=weapons[w].price;
        weapon=w;
        ammo=weapons[w].ammo;
        maxAmmo=weapons[w].maxAmmo;
        updateGunModel();
        updateUI();
        closeBuyMenu();
    }else{alert('Недостаточно денег!');}
}

function openBuyMenu(){document.getElementById('buyMenu').classList.add('show');}
function closeBuyMenu(){document.getElementById('buyMenu').classList.remove('show');}

function updateUI(){
    document.getElementById('moneyUI').textContent='$'+money;
    document.getElementById('ammoUI').textContent=ammo+'/'+maxAmmo;
    document.getElementById('weaponUI').textContent='🔫 '+weapons[weapon].name;
    document.getElementById('ctScore').textContent='CT: '+ctScore;
    document.getElementById('tScore').textContent='T: '+tScore;
    document.getElementById('healthUI').textContent='❤️ '+health;
}

function addKillfeed(text){
    let kf=document.getElementById('killfeed');
    let d=document.createElement('div');
    d.textContent=text;
    kf.appendChild(d);
    setTimeout(()=>d.remove(),3000);
}

function createExplosion(pos){
    for(let i=0;i<15;i++){
        let p=new THREE.Mesh(new THREE.SphereGeometry(0.1,4,4),new THREE.MeshBasicMaterial({color:0xff4400}));
        p.position.copy(pos);
        p.velocity=new THREE.Vector3((Math.random()-0.5)*2,Math.random()*2,(Math.random()-0.5)*2);
        p.life=1;
        scene.add(p);
        particles.push(p);
    }
}

// === КОЛЛИЗИЯ ===
function checkCollision(pos){
    let playerBox=new THREE.Box3(new THREE.Vector3(pos.x-0.3,pos.y-1.7,pos.z-0.3),new THREE.Vector3(pos.x+0.3,pos.y+0.3,pos.z+0.3));
    for(let w of walls){
        if(playerBox.intersectsBox(w.box))return true;
    }
    return false;
}

// === ВРАГИ ===
function spawnEnemy(){
    let x=(Math.random()-0.5)*20;
    let z=15+Math.random()*20;
    let body=new THREE.Mesh(new THREE.CapsuleGeometry(0.3,1.2,4,8),new THREE.MeshStandardMaterial({color:0xcc4444}));
    body.position.set(x,1,z);
    body.castShadow=true;
    scene.add(body);
    enemies.push({mesh:body,position:body.position,health:100});
}

function spawnWave(){for(let i=0;i<3;i++)spawnEnemy();}
spawnWave();

// === АНИМАЦИЯ ===
function animate(){
    requestAnimationFrame(animate);
    if(gameActive){
        // Движение игрока
        let speed=0.15;
        let dir=new THREE.Vector3();
        if(moveForward)dir.z-=speed;
        if(moveBack)dir.z+=speed;
        if(moveLeft)dir.x-=speed;
        if(moveRight)dir.x+=speed;
        dir.applyQuaternion(camera.quaternion);
        dir.y=0;
        let newPos=camera.position.clone().add(dir);
        if(!checkCollision(newPos)){
            camera.position.copy(newPos);
            camera.position.y=1.7;
        }
        
        // Обновление видимого тела
        playerBody.position.copy(camera.position);
        playerBody.position.y-=1.7;
        playerBody.rotation.y=camera.rotation.y;
        
        // Движение врагов
        enemies.forEach(e=>{
            let toPlayer=camera.position.clone().sub(e.position).normalize();
            let newEPos=e.position.clone().add(toPlayer.multiplyScalar(0.04));
            let eBox=new THREE.Box3(new THREE.Vector3(newEPos.x-0.3,newEPos.y-0.5,newEPos.z-0.3),new THREE.Vector3(newEPos.x+0.3,newEPos.y+1,newEPos.z+0.3));
            let blocked=false;
            for(let w of walls){if(eBox.intersectsBox(w.box)){blocked=true;break;}}
            if(!blocked)e.position.copy(newEPos);
            e.mesh.position.copy(e.position);
            e.mesh.lookAt(camera.position);
            
            if(camera.position.distanceTo(e.position)<1.5){
                health-=0.5;
                updateUI();
                if(health<=0){gameActive=false;addKillfeed('💀 Вас убили');}
            }
        });
    }
    
    // Частицы
    particles.forEach((p,i)=>{
        p.position.add(p.velocity.clone().multiplyScalar(0.1));
        p.velocity.y-=0.05;
        p.life-=0.02;
        p.scale.setScalar(p.life);
        if(p.life<=0){scene.remove(p);particles.splice(i,1);}
    });
    
    renderer.render(scene,camera);
}
animate();

updateUI();
window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
  </html>
