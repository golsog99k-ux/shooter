<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎣 TomatiK Fishing Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:Arial;user-select:none;touch-action:manipulation;height:100vh}
        canvas{display:block}
        .ui{position:fixed;top:15px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;color:white}
        .money{font-size:38px;font-weight:bold;color:#ffaa00;text-shadow:0 0 15px rgba(255,170,0,0.5)}
        .catch-text{font-size:22px;color:#ff8800;margin-top:5px;min-height:35px}
        .shop-btn{position:fixed;top:15px;right:15px;z-index:30;background:rgba(0,0,0,0.7);color:#ff8800;border:2px solid #ff8800;padding:10px 18px;border-radius:20px;font-size:14px;cursor:pointer;pointer-events:auto}
        .rod-info{position:fixed;bottom:15px;left:0;right:0;text-align:center;color:white;font-size:13px;z-index:10;pointer-events:none}
        .jackpot{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:60px;font-weight:bold;color:#ffaa00;z-index:50;pointer-events:none;transition:transform 0.3s;text-shadow:0 0 30px #ff8800,0 0 60px #ff4400}
        .jackpot.show{transform:translate(-50%,-50%) scale(1);animation:jpAnim 2s forwards}
        @keyframes jpAnim{0%{transform:translate(-50%,-50%) scale(0) rotate(0deg)}50%{transform:translate(-50%,-50%) scale(1.5) rotate(180deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(360deg);opacity:0}}
        .cast-hint{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.6);font-size:14px;z-index:10;pointer-events:none}
        .shop-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column;overflow-y:auto;padding:20px}
        .shop-overlay.show{display:flex}
        .shop-overlay h2{color:#ff8800;margin-bottom:15px}
        .shop-overlay button{padding:12px 25px;background:#ff4444;color:white;border:none;border-radius:15px;margin:5px;cursor:pointer;font-weight:bold;font-size:13px;width:85%;max-width:300px}
        .shop-overlay .close-btn{background:#333}
        .shop-overlay p{color:white;font-size:12px;margin:3px 0}
        .owned{background:#00aa44!important}
    </style>
</head>
<body>

<div class="ui">
    <div class="money" id="money">💰 0</div>
    <div class="catch-text" id="catchText">🎣 Свайпни вниз чтобы закинуть!</div>
</div>

<div class="rod-info" id="rodInfo">🎣 Классическая удочка</div>
<div class="cast-hint">👇 Свайп вниз = закинуть</div>

<button class="shop-btn" onclick="openShop()">🛒</button>

<div class="jackpot" id="jackpot">🎰 ДЖЕКПОТ!</div>

<div class="shop-overlay" id="shopOverlay">
    <h2>🛒 МАГАЗИН УДОЧЕК</h2>
    <p id="shopMoney">💰 0</p>
    <button onclick="buyRod(0)">🎣 Классическая — 0💰</button>
    <button onclick="buyRod(1)">🎣 Продвинутая — 500💰</button>
    <button onclick="buyRod(2)">🎣 Профи — 2000💰</button>
    <button onclick="buyRod(3)">🎣 Легендарная — 10000💰</button>
    <button onclick="buyRod(4)">👑 Удочка Шефа — 50000💰</button>
    <button onclick="buyRod(5)">🍅 Chef & TomatiK — 1000000💰</button>
    <button class="close-btn" onclick="closeShop()">✕ Закрыть</button>
</div>

<script>
// === ДАННЫЕ РЫБ ===
const fishData=[
    {name:'Карась',emoji:'🐟',chances:[30,15,5,1,0,0],reward:20,jackpot:false},
    {name:'Окунь',emoji:'🐠',chances:[50,30,15,5,0,0],reward:10,jackpot:false},
    {name:'Щука',emoji:'🐊',chances:[50,60,70,80,90,50],reward:100,jackpot:false},
    {name:'Акула',emoji:'🦈',chances:[20,35,50,65,80,0],reward:200,jackpot:false},
    {name:'Кит',emoji:'🐋',chances:[10,20,35,50,70,1],reward:500,jackpot:false},
    {name:'Мегалодон',emoji:'🦖',chances:[3,8,15,30,50,10],reward:1500,jackpot:false},
    {name:'Шеф',emoji:'👑',chances:[0,0,0,0,0,5],reward:30000,jackpot:true},
    {name:'Томатик',emoji:'🍅',chances:[0,0,0,0,0,3],reward:50000,jackpot:true},
    {name:'Руша',emoji:'🐱',chances:[1,3,7,15,30,50],reward:100000,jackpot:true}
];

let money=0,rodLevel=0,canCast=true,isCasting=false;
const rodNames=['Классическая','Продвинутая','Профи','Легендарная','Удочка Шефа','Chef & TomatiK'];

// === THREE.JS ===
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a3a5c);
scene.fog=new THREE.Fog(0x1a3a5c,20,60);

const camera=new THREE.PerspectiveCamera(65,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,4,7);
camera.lookAt(0,-2,-3);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Освещение
scene.add(new THREE.AmbientLight(0x334466,0.4));
const sun=new THREE.DirectionalLight(0xffddbb,1.2);
sun.position.set(20,25,10);
sun.castShadow=true;
sun.shadow.mapSize.width=1024;
sun.shadow.mapSize.height=1024;
scene.add(sun);

// Вода (реалистичная)
const waterGeom=new THREE.PlaneGeometry(50,50,100,100);
const waterMat=new THREE.MeshStandardMaterial({color:0x3377bb,transparent:true,opacity:0.85,metalness:0.4,roughness:0.2});
const water=new THREE.Mesh(waterGeom,waterMat);
water.rotation.x=-Math.PI/2;
water.position.y=-2;
water.receiveShadow=true;
scene.add(water);

// Дно
const floor=new THREE.Mesh(new THREE.PlaneGeometry(50,50),new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:0.9}));
floor.rotation.x=-Math.PI/2;
floor.position.y=-2.5;
scene.add(floor);

// Пирс
const pierWood=new THREE.Mesh(new THREE.BoxGeometry(3,0.3,6),new THREE.MeshStandardMaterial({color:0x6b4a2a,roughness:0.8}));
pierWood.position.set(0,0,4);
pierWood.castShadow=true;
pierWood.receiveShadow=true;
scene.add(pierWood);

// Столбы
for(let i=0;i<4;i++){
    let pole=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.15,4),new THREE.MeshStandardMaterial({color:0x5a3a1a}));
    pole.position.set(i<2?-1:1,0,i%2===0?2:6);
    pole.castShadow=true;
    scene.add(pole);
}

// Удочка
const rodGroup=new THREE.Group();
const rodPole=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.06,4),new THREE.MeshStandardMaterial({color:0x8B4513}));
rodPole.position.y=2;
rodGroup.add(rodPole);
const rodString=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,6),new THREE.MeshBasicMaterial({color:0xdddddd}));
rodString.position.y=-1;
rodGroup.add(rodString);
rodGroup.position.set(0,0,3);
rodGroup.rotation.x=Math.PI/5;
scene.add(rodGroup);

// Камни на берегу
for(let i=0;i<15;i++){
    let rock=new THREE.Mesh(new THREE.IcosahedronGeometry(0.2+Math.random()*0.5,0),new THREE.MeshStandardMaterial({color:0x555555,roughness:0.9}));
    rock.position.set((Math.random()-0.5)*20,0,(Math.random()*5)+2);
    rock.castShadow=true;
    rock.receiveShadow=true;
    scene.add(rock);
}

// === УПРАВЛЕНИЕ КАМЕРОЙ ===
let camAngle=0,camHeight=4,camDist=7;
document.addEventListener('mousemove',e=>{
    let cx=(e.clientX/window.innerWidth)*2-1;
    let cy=-(e.clientY/window.innerHeight)*2+1;
    camAngle=cx*0.5;
    camHeight=4+cy*1.5;
});

document.addEventListener('touchmove',e=>{
    if(isCasting)return;
    e.preventDefault();
    let cx=(e.touches[0].clientX/window.innerWidth)*2-1;
    let cy=-(e.touches[0].clientY/window.innerHeight)*2+1;
    camAngle=cx*0.5;
    camHeight=4+cy*1.5;
});

// === ЗАКИДЫВАНИЕ СВАЙПОМ ===
let touchStartY=0;
document.addEventListener('touchstart',e=>{
    touchStartY=e.touches[0].clientY;
});

document.addEventListener('touchend',e=>{
    if(isCasting||!canCast)return;
    let diff=touchStartY-e.changedTouches[0].clientY;
    if(diff<-50){
        castRod();
    }
});

// === ФУНКЦИИ ===
function castRod(){
    if(!canCast||isCasting)return;
    isCasting=true;
    canCast=false;
    document.getElementById('catchText').textContent='⏳ Закинуто... Ждём...';
    
    // Анимация закидывания
    rodGroup.rotation.x=Math.PI/3;
    setTimeout(()=>rodGroup.rotation.x=Math.PI/5,500);
    
    setTimeout(()=>{
        let fish=catchFish();
        document.getElementById('catchText').textContent='🐟 '+fish.emoji+' '+fish.name+'! +'+fish.reward+'💰';
        money+=fish.reward;
        updateUI();
        isCasting=false;
        canCast=true;
        
        if(fish.jackpot){
            showJackpot(fish);
        }
    },1500+Math.random()*3000);
}

function catchFish(){
    let rand=Math.random()*100;
    let cumulative=0;
    for(let i=fishData.length-1;i>=0;i--){
        cumulative+=fishData[i].chances[rodLevel];
        if(rand<cumulative)return fishData[i];
    }
    return fishData[0];
}

function showJackpot(fish){
    let jp=document.getElementById('jackpot');
    jp.textContent='🎰 ДЖЕКПОТ! '+fish.emoji+' '+fish.name+'!';
    jp.classList.remove('show');
    void jp.offsetWidth;
    jp.classList.add('show');
    setTimeout(()=>jp.classList.remove('show'),2000);
}

function updateUI(){
    document.getElementById('money').textContent='💰 '+money.toLocaleString();
    document.getElementById('rodInfo').textContent='🎣 '+rodNames[rodLevel]+' удочка';
}

function openShop(){
    document.getElementById('shopOverlay').classList.add('show');
    document.getElementById('shopMoney').textContent='💰 '+money.toLocaleString();
    updateShopButtons();
}

function closeShop(){
    document.getElementById('shopOverlay').classList.remove('show');
}

function buyRod(level){
    let prices=[0,500,2000,10000,50000,1000000];
    if(level<=rodLevel){alert('❌ У вас уже есть удочка лучше!');return;}
    if(money>=prices[level]){
        money-=prices[level];
        rodLevel=level;
        updateUI();
        updateShopButtons();
        alert('✅ Куплена: '+rodNames[rodLevel]+'!');
    }else{
        alert('❌ Не хватает! Нужно: '+prices[level].toLocaleString()+'💰');
    }
}

function updateShopButtons(){
    let btns=document.querySelectorAll('.shop-overlay button:not(.close-btn)');
    btns.forEach((btn,i)=>{
        if(i<=rodLevel)btn.classList.add('owned');
        else btn.classList.remove('owned');
    });
}

function animate(){
    requestAnimationFrame(animate);
    
    // Анимация воды
    water.position.z+=0.03;
    if(water.position.z>5)water.position.z=0;
    
    // Камера
    camera.position.x=Math.sin(camAngle)*camDist;
    camera.position.z=Math.cos(camAngle)*camDist;
    camera.position.y=camHeight;
    camera.lookAt(0,-2,-3);
    
    renderer.render(scene,camera);
}
animate();

updateUI();
updateShopButtons();

window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
