<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎣 3D Рыбалка - TomatiK Fishing</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;overflow:hidden;font-family:Arial;user-select:none;touch-action:manipulation;height:100vh}
        canvas{display:block}
        .ui{position:fixed;top:15px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;color:white}
        .money{font-size:35px;font-weight:bold;color:#ffaa00}
        .catch{font-size:20px;color:#ff8800;margin-top:5px;min-height:30px}
        .shop-btn{position:fixed;top:15px;right:15px;z-index:30;background:rgba(0,0,0,0.6);color:#ff8800;border:2px solid #ff8800;padding:10px 18px;border-radius:20px;font-size:14px;cursor:pointer;pointer-events:auto}
        .cast-btn{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:30;background:#ff4444;color:white;border:none;padding:15px 50px;border-radius:30px;font-size:20px;cursor:pointer;pointer-events:auto;font-weight:bold}
        .cast-btn:active{background:#cc0000}
        .rod-level{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);color:white;font-size:14px;z-index:10;pointer-events:none}
        .shop-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column;overflow-y:auto;padding:20px}
        .shop-overlay.show{display:flex}
        .shop-overlay h2{color:#ff8800;margin-bottom:15px}
        .shop-overlay button{padding:12px 25px;background:#ff4444;color:white;border:none;border-radius:15px;margin:5px;cursor:pointer;font-weight:bold;font-size:14px;width:80%;max-width:300px}
        .shop-overlay .close-btn{background:#333}
        .shop-overlay p{color:white;font-size:13px;margin:5px 0}
    </style>
</head>
<body>

<div class="ui">
    <div class="money" id="money">💰 0</div>
    <div class="catch" id="catchText">🎣 Закинь удочку!</div>
</div>

<div class="rod-level" id="rodLevel">🎣 Классическая удочка</div>

<button class="shop-btn" onclick="openShop()">🛒</button>
<button class="cast-btn" id="castBtn" onclick="castRod()">🎣 ЗАКИНУТЬ</button>

<div class="shop-overlay" id="shopOverlay">
    <h2>🛒 МАГАЗИН УДОЧЕК</h2>
    <p id="shopMoney">💰 0</p>
    <button onclick="buyRod(1)">🎣 Классическая — 100💰</button>
    <button onclick="buyRod(2)">🎣 Продвинутая — 500💰</button>
    <button onclick="buyRod(3)">🎣 Профи — 2000💰</button>
    <button onclick="buyRod(4)">🎣 Легендарная — 10000💰</button>
    <button onclick="buyRod(5)">👑 Удочка Шефа — 50000💰</button>
    <button class="close-btn" onclick="closeShop()">✕ Закрыть</button>
</div>

<script>
// === ДАННЫЕ РЫБ ===
const fishData=[
    {name:'Карась',emoji:'🐟',chances:[30,15,5,1,0],reward:20},
    {name:'Окунь',emoji:'🐠',chances:[50,30,15,5,0],reward:10},
    {name:'Щука',emoji:'🐊',chances:[50,60,70,80,90],reward:100},
    {name:'Акула',emoji:'🦈',chances:[20,35,50,65,80],reward:200},
    {name:'Кит',emoji:'🐋',chances:[10,20,35,50,70],reward:500},
    {name:'Мегалодон',emoji:'🦖',chances:[3,8,15,30,50],reward:1500},
    {name:'Руша',emoji:'🐱',chances:[1,3,7,15,30],reward:100000}
];

let money=0,rodLevel=0,canCast=true;
const rodNames=['Классическая','Продвинутая','Профи','Легендарная','Удочка Шефа'];

// === THREE.JS ===
const scene=new THREE.Scene();scene.background=new THREE.Color(0x4488cc);
const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,3,5);camera.lookAt(0,-2,-5);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.6));
const sun=new THREE.DirectionalLight(0xffffcc,0.8);sun.position.set(10,15,0);scene.add(sun);

// Вода
const water=new THREE.Mesh(new THREE.PlaneGeometry(30,30),new THREE.MeshStandardMaterial({color:0x2266aa,transparent:true,opacity:0.8,metalness:0.3,roughness:0.3}));
water.rotation.x=-Math.PI/2;water.position.y=-2;scene.add(water);

// Пирс
const pier=new THREE.Mesh(new THREE.BoxGeometry(2,0.3,4),new THREE.MeshStandardMaterial({color:0x8B4513}));
pier.position.set(0,0,3);scene.add(pier);

// Удочка (визуальная)
const rod=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,3),new THREE.MeshStandardMaterial({color:0x8B4513}));
rod.position.set(0,1.5,2);rod.rotation.x=Math.PI/4;scene.add(rod);
const line=new THREE.Mesh(new THREE.CylinderGeometry(0.01,0.01,5),new THREE.MeshBasicMaterial({color:0xffffff}));
line.position.set(0,-1,0);scene.add(line);

// === ФУНКЦИИ ===
function castRod(){
    if(!canCast)return;
    canCast=false;
    document.getElementById('castBtn').textContent='⏳ Ловим...';
    document.getElementById('catchText').textContent='🎣 Ждём поклёвку...';
    
    setTimeout(()=>{
        let fish=catchFish();
        document.getElementById('catchText').textContent='🐟 Поймано: '+fish.emoji+' '+fish.name+'! +'+fish.reward+'💰';
        money+=fish.reward;
        updateUI();
        canCast=true;
        document.getElementById('castBtn').textContent='🎣 ЗАКИНУТЬ';
    },1500+Math.random()*3000);
}

function catchFish(){
    let rand=Math.random()*100;
    let cumulative=0;
    for(let i=fishData.length-1;i>=0;i--){
        cumulative+=fishData[i].chances[rodLevel];
        if(rand<cumulative)return fishData[i];
    }
    return fishData[0];
}

function updateUI(){
    document.getElementById('money').textContent='💰 '+money;
    document.getElementById('rodLevel').textContent='🎣 '+rodNames[rodLevel]+' удочка';
}

function openShop(){
    document.getElementById('shopOverlay').classList.add('show');
    document.getElementById('shopMoney').textContent='💰 '+money;
}

function closeShop(){
    document.getElementById('shopOverlay').classList.remove('show');
}

function buyRod(level){
    let prices=[100,500,2000,10000,50000];
    if(level<=rodLevel){alert('❌ У вас уже есть удочка лучше!');return;}
    if(money>=prices[level-1]){
        money-=prices[level-1];
        rodLevel=level-1;
        updateUI();
        closeShop();
        alert('✅ Куплена: '+rodNames[rodLevel]+'!');
    }else{
        alert('❌ Не хватает денег! Нужно: '+prices[level-1]+'💰');
    }
}

function animate(){requestAnimationFrame(animate);water.position.z+=0.01;if(water.position.z>5)water.position.z=0;renderer.render(scene,camera);}
animate();

updateUI();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
  </html>
