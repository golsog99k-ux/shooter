<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>👻 TomatiK Horror 3D</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:Arial;user-select:none;touch-action:manipulation;height:100vh}
        canvas{display:block}
        .ui{position:fixed;top:15px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;color:white}
        .fear{font-size:30px;font-weight:bold;color:#ff4444}
        .crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:20;font-size:30px}
        .screamer{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:50;display:none;align-items:center;justify-content:center;flex-direction:column}
        .screamer.show{display:flex}
        .screamer .ghost{font-size:150px;animation:shake 0.1s infinite}
        @keyframes shake{0%{transform:translate(0,0)}25%{transform:translate(-10px,10px)}50%{transform:translate(10px,-10px)}75%{transform:translate(-10px,-10px)}100%{transform:translate(10px,10px)}}
        
        .controls{position:fixed;bottom:30px;left:0;right:0;z-index:30;display:flex;justify-content:center;gap:20px;pointer-events:none}
        .c-btn{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);color:white;font-size:24px;display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer}
        .c-btn:active{background:rgba(255,68,68,0.6)}
        .dpad{position:fixed;bottom:30px;left:20px;z-index:30;pointer-events:auto}
        .dpad-row{display:flex;justify-content:center}
        .dpad-btn{width:50px;height:50px;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);color:white;font-size:20px;display:flex;align-items:center;justify-content:center;margin:2px;cursor:pointer;border-radius:10px}
        .dpad-btn:active{background:rgba(255,68,68,0.6)}
        .look-area{position:fixed;top:0;right:0;width:50%;height:70%;z-index:25;pointer-events:auto}
    </style>
</head>
<body>

<div class="crosshair" id="crosshair">🔦</div>
<div class="ui"><div class="fear" id="fear">😊 Спокойно</div></div>

<div class="screamer" id="screamer">
    <div class="ghost">👻</div>
</div>

<div class="look-area" id="lookArea"></div>

<div class="dpad" id="dpad">
    <div class="dpad-row"><button class="dpad-btn" id="btnUp" ontouchstart="moveStart('up')" ontouchend="moveEnd()">⬆️</button></div>
    <div class="dpad-row">
        <button class="dpad-btn" id="btnLeft" ontouchstart="moveStart('left')" ontouchend="moveEnd()">⬅️</button>
        <button class="dpad-btn" id="btnDown" ontouchstart="moveStart('down')" ontouchend="moveEnd()">⬇️</button>
        <button class="dpad-btn" id="btnRight" ontouchstart="moveStart('right')" ontouchend="moveEnd()">➡️</button>
    </div>
</div>

<script>
const scene=new THREE.Scene();scene.background=new THREE.Color(0x050510);scene.fog=new THREE.Fog(0x050510,3,40);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);camera.position.set(0,1.5,0);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x111133,0.2));
const flashlight=new THREE.SpotLight(0xffffcc,1,25,Math.PI/6,0.3,0.5);
flashlight.position.set(0,1.5,0);camera.add(flashlight);
const flashlightTarget=new THREE.Object3D();flashlightTarget.position.set(0,1.5,-10);camera.add(flashlightTarget);flashlight.target=flashlightTarget;
scene.add(camera);

const ground=new THREE.Mesh(new THREE.PlaneGeometry(80,120),new THREE.MeshStandardMaterial({color:0x0a1a05,roughness:0.9}));
ground.rotation.x=-Math.PI/2;ground.position.z=-40;ground.receiveShadow=true;scene.add(ground);

for(let i=0;i<50;i++){
    let h=3+Math.random()*6;
    let trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.25,h,6),new THREE.MeshStandardMaterial({color:0x1a0a05}));
    trunk.position.set((Math.random()-0.5)*60,h/2,-5-Math.random()*80);trunk.castShadow=true;scene.add(trunk);
    let leaves=new THREE.Mesh(new THREE.ConeGeometry(1+Math.random(),2+Math.random()*3,6),new THREE.MeshStandardMaterial({color:0x0a1a0a}));
    leaves.position.copy(trunk.position);leaves.position.y+=h/2+0.5;scene.add(leaves);
}

let ghosts=[];
for(let i=0;i<6;i++){
    let g=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),new THREE.MeshBasicMaterial({color:0xaaffaa,transparent:true,opacity:0.5}));
    g.position.set((Math.random()-0.5)*35,1+Math.random()*3,-15-Math.random()*40);
    g.velocity=new THREE.Vector3((Math.random()-0.5)*0.04,0,(Math.random()-0.5)*0.04);
    scene.add(g);ghosts.push(g);
}

let fear=0,gameActive=true,moveDir={x:0,z:0};

const lookArea=document.getElementById('lookArea');
lookArea.addEventListener('touchmove',e=>{
    e.preventDefault();
    let touch=e.touches[0];
    let cx=(touch.clientX/window.innerWidth)*2-1;
    let cy=-(touch.clientY/window.innerHeight)*2+1;
    camera.rotation.y+=cx*0.04;
    camera.rotation.x=Math.max(-0.6,Math.min(0.4,camera.rotation.x+cy*0.03));
    flashlightTarget.position.set(0+Math.sin(camera.rotation.y)*10,camera.position.y+cy*5,-10+Math.cos(camera.rotation.y)*10);
});

document.addEventListener('mousemove',e=>{
    let cx=(e.clientX/window.innerWidth)*2-1;
    let cy=-(e.clientY/window.innerHeight)*2+1;
    camera.rotation.y+=cx*0.02;
    camera.rotation.x=Math.max(-0.6,Math.min(0.4,camera.rotation.x+cy*0.015));
    flashlightTarget.position.set(0+Math.sin(camera.rotation.y)*10,camera.position.y+cy*5,-10+Math.cos(camera.rotation.y)*10);
});

function moveStart(dir){
    if(dir==='up')moveDir.z=-0.3;
    if(dir==='down')moveDir.z=0.3;
    if(dir==='left')moveDir.x=-0.3;
    if(dir==='right')moveDir.x=0.3;
}
function moveEnd(){moveDir.x=0;moveDir.z=0;}

setInterval(()=>{
    if(moveDir.x!==0||moveDir.z!==0){
        let dir=new THREE.Vector3(moveDir.x,0,moveDir.z);
        dir.applyQuaternion(camera.quaternion);
        camera.position.add(dir);
    }
},30);

function animate(){
    requestAnimationFrame(animate);
    if(gameActive){
        ghosts.forEach(g=>{
            g.position.add(g.velocity);
            if(g.position.x>30||g.position.x<-30)g.velocity.x*=-1;
            if(g.position.z>20||g.position.z<-80)g.velocity.z*=-1;
            g.rotation.y+=0.02;
            
            let dist=camera.position.distanceTo(g.position);
            if(dist<2.5){
                fear+=0.8;
                if(fear>8&&Math.random()<0.03){
                    document.getElementById('screamer').classList.add('show');
                    gameActive=false;
                    setTimeout(()=>{document.getElementById('screamer').classList.remove('show');gameActive=true;fear=0;},1500);
                }
            }
        });
        fear=Math.max(0,fear-0.03);
        let f=document.getElementById('fear');
        if(fear<2)f.textContent='😊 Спокойно';
        else if(fear<4)f.textContent='😨 Тревожно';
        else if(fear<7)f.textContent='😱 Страшно';
        else f.textContent='💀 УЖАС!';
    }
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
