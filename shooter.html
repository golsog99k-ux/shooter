<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔫 TomatiK Strike 2 - OFFLINE</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;overflow:hidden;font-family:Arial;touch-action:manipulation;height:100vh}
        canvas{display:block}
        .ui{position:fixed;top:15px;left:0;right:0;text-align:center;z-index:10;pointer-events:none}
        .score{font-size:40px;font-weight:bold;color:#ff8800}
        .money{font-size:18px;color:#ffaa00}
        .ammo{position:fixed;bottom:120px;right:20px;color:white;font-size:18px;z-index:10;pointer-events:none}
        .crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;pointer-events:none;z-index:20}
        .btns{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:space-around;padding:0 10px;z-index:30}
        .btn{width:55px;height:55px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid white;color:white;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        .btn:active{background:rgba(255,68,68,0.7)}
        .shop-btn{position:fixed;top:15px;right:15px;z-index:30;background:rgba(0,0,0,0.6);color:#ff8800;border:2px solid #ff8800;padding:8px 15px;border-radius:20px;font-size:14px;cursor:pointer}
    </style>
</head>
<body>
<canvas id="game"></canvas>
<div class="ui">
    <div class="score" id="score">0</div>
    <div class="money" id="money">💰 800</div>
</div>
<div class="crosshair" id="ch">➕</div>
<div class="ammo" id="ammo">🔫 USP | 12/24</div>
<div class="btns">
    <button class="btn" onclick="switchWeapon('usp')">USP</button>
    <button class="btn" id="shootBtn" ontouchstart="startShoot()" ontouchend="stopShoot()" onmousedown="startShoot()" onmouseup="stopShoot()">🔫</button>
    <button class="btn" onclick="reload()">🔄</button>
    <button class="btn" onclick="switchWeapon('ak')">AK</button>
    <button class="btn" onclick="switchWeapon('awp')">AWP</button>
    <button class="btn" onclick="throwGrenade()">💣</button>
</div>
<button class="shop-btn" onclick="openShop()">🛒</button>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let score=0,money=800,combo=0;
let tomatoes=[],bombs=[],bullets=[],particles=[];
let weapon='usp',ammo=12,maxAmmo=24,canShoot=true;
let mouseX=canvas.width/2,mouseY=canvas.height/2;
let hasArmor=false,grenades=0;

const weapons={
    usp:{name:'USP',ammo:12,maxAmmo:24,damage:1,fireRate:150,price:0},
    ak:{name:'AK-47',ammo:30,maxAmmo:90,damage:2,fireRate:100,price:500},
    awp:{name:'AWP',ammo:5,maxAmmo:15,damage:5,fireRate:1500,price:1500}
};

canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;document.getElementById('ch').style.left=e.clientX+'px';document.getElementById('ch').style.top=e.clientY+'px';});
canvas.addEventListener('touchmove',e=>{e.preventDefault();mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;document.getElementById('ch').style.left=e.touches[0].clientX+'px';document.getElementById('ch').style.top=e.touches[0].clientY+'px';});
canvas.addEventListener('click',shoot);
canvas.addEventListener('touchstart',e=>{e.preventDefault();shoot();});

function shoot(){
    if(!canShoot||ammo<=0)return;
    ammo--;canShoot=false;updateHUD();
    bullets.push({x:canvas.width/2,y:canvas.height/2,vx:(mouseX-canvas.width/2)*0.05,vy:(mouseY-canvas.height/2)*0.05,life:30});
    setTimeout(()=>canShoot=true,weapons[weapon].fireRate);
}

let shootInterval;
function startShoot(){shoot();shootInterval=setInterval(shoot,weapons[weapon].fireRate);}
function stopShoot(){clearInterval(shootInterval);}

function switchWeapon(w){
    weapon=w;ammo=weapons[w].ammo;maxAmmo=weapons[w].maxAmmo;updateHUD();
}

function reload(){
    ammo=weapons[weapon].ammo;maxAmmo-=weapons[weapon].ammo;
    if(maxAmmo<0)maxAmmo=0;updateHUD();
}

function updateHUD(){
    document.getElementById('ammo').textContent='🔫 '+weapons[weapon].name+' | '+ammo+'/'+maxAmmo;
}

function throwGrenade(){
    if(grenades<=0){alert('Нет гранат! Купи в 🛒');return;}
    grenades--;
    tomatoes.forEach(t=>{
        let dist=Math.hypot(t.x-mouseX,t.y-mouseY);
        if(dist<200){t.hp-=3;if(t.hp<=0){score+=10;money+=100;createParticles(t.x,t.y,'#ff8800');}}
    });
    tomatoes=tomatoes.filter(t=>t.hp>0);
    createParticles(mouseX,mouseY,'#ff4400');
    document.getElementById('score').textContent=score;
    document.getElementById('money').textContent='💰 '+money;
}

function openShop(){
    let msg='🛒 МАГАЗИН\n💰 Деньги: '+money+'\n\n';
    msg+='1. USP-S — Бесплатно\n';
    msg+='2. AK-47 — 500 💰\n';
    msg+='3. AWP — 1500 💰\n';
    msg+='4. Граната — 200 💰\n';
    msg+='5. Броня — 300 💰\n';
    msg+='6. Закрыть';
    let choice=prompt(msg);
    if(choice==='1'){switchWeapon('usp');}
    if(choice==='2'){if(money>=500){money-=500;switchWeapon('ak');}else alert('❌ Не хватает!');}
    if(choice==='3'){if(money>=1500){money-=1500;switchWeapon('awp');}else alert('❌ Не хватает!');}
    if(choice==='4'){if(money>=200){money-=200;grenades++;alert('✅ Граната куплена!');}else alert('❌ Не хватает!');}
    if(choice==='5'){if(money>=300&&!hasArmor){money-=300;hasArmor=true;alert('🛡️ Броня куплена!');}else alert(hasArmor?'Уже есть!':'❌ Не хватает!');}
    document.getElementById('money').textContent='💰 '+money;
}

function spawn(){
    if(Math.random()<0.02){
        let isBomb=Math.random()<0.2;
        let x=Math.random()*canvas.width;
        let obj={x:x,y:-30,size:isBomb?30:40,speed:1+Math.random()*3,hp:isBomb?999:1,isBomb:isBomb};
        if(isBomb)bombs.push(obj);else tomatoes.push(obj);
    }
}

function createParticles(x,y,color){
    for(let i=0;i<8;i++){particles.push({x:x,y:y,vx:(Math.random()-0.5)*5,vy:(Math.random()-0.5)*5,life:20,color:color});}
}

function draw(){
    ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,canvas.width,canvas.height);
    
    // Звёзды
    for(let i=0;i<50;i++){ctx.fillStyle='#fff';ctx.fillRect((i*73)%canvas.width,(i*37)%canvas.height,1,1);}
    
    // Пули
    ctx.fillStyle='#ff0';
    bullets.forEach(b=>{ctx.fillRect(b.x,b.y,4,4);b.x+=b.vx;b.y+=b.vy;b.life--;});
    bullets=bullets.filter(b=>b.life>0&&b.x>0&&b.x<canvas.width&&b.y>0&&b.y<canvas.height);
    
    // Томаты
    tomatoes.forEach(t=>{
        ctx.font=t.size+'px Arial';ctx.fillText('🍅',t.x,t.y);
        t.y+=t.speed;
        // Попадание пули
        bullets.forEach(b=>{
            if(Math.hypot(b.x-t.x,b.y-t.y)<t.size){t.hp-=weapons[weapon].damage;b.life=0;}
        });
        if(t.hp<=0){score+=10;money+=100;createParticles(t.x,t.y,'#ff4444');}
        // Долетел до игрока
        if(t.y>canvas.height&&!hasArmor){score-=5;money-=50;}
        if(t.y>canvas.height&&hasArmor){hasArmor=false;}
    });
    tomatoes=tomatoes.filter(t=>t.hp>0&&t.y<canvas.height+50);
    
    // Бомбы
    bombs.forEach(b=>{
        ctx.font=b.size+'px Arial';ctx.fillText('💣',b.x,b.y);
        b.y+=b.speed;
        bullets.forEach(bul=>{if(Math.hypot(bul.x-b.x,bul.y-b.y)<b.size){score-=10;money-=100;createParticles(b.x,b.y,'#f00');bul.life=0;b.life=0;}});
    });
    bombs=bombs.filter(b=>b.y<canvas.height+50);
    
    // Частицы
    particles.forEach(p=>{ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,3,3);p.x+=p.vx;p.y+=p.vy;p.life--;});
    particles=particles.filter(p=>p.life>0);
    
    document.getElementById('score').textContent=score;
    document.getElementById('money').textContent='💰 '+money;
    
    spawn();
    requestAnimationFrame(draw);
}

updateHUD();
draw();
</script>
</body>
</html>
