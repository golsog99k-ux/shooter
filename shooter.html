<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔫 TomatiK Strike 2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:Arial;user-select:none;touch-action:manipulation;height:100vh}
        canvas{display:block}
        .ui{position:fixed;top:15px;left:0;right:0;text-align:center;z-index:10;pointer-events:none}
        .score{font-size:45px;font-weight:bold;color:#ff8800;text-shadow:0 0 20px rgba(255,136,0,0.5)}
        .crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:35px;pointer-events:none;z-index:20;opacity:0.9}
        .killfeed{position:fixed;top:80px;right:20px;z-index:10;pointer-events:none}
        .kill{color:white;font-size:14px;margin:3px 0;animation:fade 3s forwards}
        @keyframes fade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
        .mobile-controls{position:fixed;bottom:20px;left:0;right:0;z-index:30;display:flex;justify-content:space-between;padding:0 20px;pointer-events:none}
        .ctrl-btn{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.5);color:white;font-size:24px;display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer}
        .ctrl-btn:active{background:rgba(255,68,68,0.6);transform:scale(0.9)}
        .weapon-select{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:30;display:flex;gap:10px}
        .weapon-btn{width:50px;height:50px;border-radius:15px;background:rgba(0,0,0,0.6);border:2px solid rgba(255,255,255,0.4);color:white;font-size:11px;cursor:pointer;pointer-events:auto;text-align:center}
        .weapon-btn.active{border-color:#ff4444;background:rgba(255,68,68,0.4)}
        .ammo-display{position:fixed;bottom:100px;right:20px;color:white;font-size:20px;z-index:30;pointer-events:none}
    </style>
</head>
<body>

<div class="crosshair" id="crosshair">➕</div>
<div class="ui"><div class="score" id="score">0</div></div>
<div class="killfeed" id="killfeed"></div>

<div class="mobile-controls">
    <button class="ctrl-btn" onclick="throwGrenade()">💣</button>
    <button class="ctrl-btn" id="shootBtn" onmousedown="startShooting()" onmouseup="stopShooting()" ontouchstart="startShooting()" ontouchend="stopShooting()">🔫</button>
    <button class="ctrl-btn" onclick="reload()">🔄</button>
</div>

<div class="weapon-select">
    <button class="weapon-btn active" onclick="switchWeapon('usp')">USP</button>
    <button class="weapon-btn" onclick="switchWeapon('ak')">AK</button>
    <button class="weapon-btn" onclick="switchWeapon('awp')">AWP</button>
</div>

<div class="ammo-display" id="ammoDisplay">12/24</div>

<button id="shopBtn" onclick="openShop()" style="position:fixed;top:20px;right:20px;z-index:35;background:rgba(0,0,0,0.6);color:#ff8800;border:2px solid #ff8800;padding:10px 15px;border-radius:20px;font-size:16px;cursor:pointer;pointer-events:auto">🛒</button>

<div id="shopOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);z-index:40;display:none;align-items:center;justify-content:center;flex-direction:column">
    <h1 style="color:#ff8800;font-size:30px;margin-bottom:20px">🛒 МАГАЗИН</h1>
    <p style="color:white;font-size:18px;margin-bottom:20px">Очки: <span id="shopScore">0</span> 💰</p>
    <div style="display:flex;flex-direction:column;gap:10px;width:80%;max-width:300px">
        <button onclick="buyWeapon('usp')" style="padding:15px;background:#333;color:white;border:2px solid #666;border-radius:10px;cursor:pointer;font-size:16px">🔫 USP-S — БЕСПЛАТНО</button>
        <button onclick="buyWeapon('ak')" style="padding:15px;background:#4a2800;color:white;border:2px solid #8a5800;border-radius:10px;cursor:pointer;font-size:16px">🔫 AK-47 — 500 💰</button>
        <button onclick="buyWeapon('awp')" style="padding:15px;background:#1a4a00;color:white;border:2px solid #2a7a00;border-radius:10px;cursor:pointer;font-size:16px">🔭 AWP — 1500 💰</button>
        <button onclick="buyGrenade()" style="padding:15px;background:#553300;color:white;border:2px solid #885500;border-radius:10px;cursor:pointer;font-size:16px">💣 Граната — 200 💰</button>
        <button onclick="buyArmor()" style="padding:15px;background:#003366;color:white;border:2px solid #005599;border-radius:10px;cursor:pointer;font-size:16px">🛡️ Броня — 300 💰</button>
    </div>
    <button onclick="closeShop()" style="margin-top:20px;padding:12px 40px;background:#ff4444;color:white;border:none;border-radius:20px;font-size:18px;cursor:pointer">✕ ЗАКРЫТЬ</button>
</div>

<script>
const scene=new THREE.Scene();scene.background=new THREE.Color(0x1a1a2e);scene.fog=new THREE.Fog(0x1a1a2e,30,100);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);camera.position.set(0,1.5,0);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(window.innerWidth,window.innerHeight);renderer.shadowMap.enabled=true;document.body.appendChild(renderer.domElement);
const floor=new THREE.Mesh(new THREE.PlaneGeometry(50,100),new THREE.MeshStandardMaterial({color:0x2a2a3e,roughness:0.8}));floor.rotation.x=-Math.PI/2;floor.position.z=-30;scene.add(floor);
for(let i=0;i<10;i++){let w=new THREE.Mesh(new THREE.BoxGeometry(0.5,3,2),new THREE.MeshStandardMaterial({color:0x3a3a4e}));w.position.set((Math.random()-0.5)*20,1.5,-10-Math.random()*30);scene.add(w);}
const sky=new THREE.Mesh(new THREE.SphereGeometry(80,32,32),new THREE.MeshBasicMaterial({color:0x0a0a2e,side:THREE.BackSide}));scene.add(sky);
scene.add(new THREE.AmbientLight(0x404060,0.5));const light=new THREE.DirectionalLight(0xff8866,1);light.position.set(10,20,0);light.castShadow=true;scene.add(light);
for(let i=0;i<200;i++){let s=new THREE.Mesh(new THREE.SphereGeometry(0.05,4,4),new THREE.MeshBasicMaterial({color:0xffffff}));s.position.set((Math.random()-0.5)*80,Math.random()*40+5,-Math.random()*80);scene.add(s);}

const gunGroup=new THREE.Group();gunGroup.position.set(0.25,-0.25,-0.7);camera.add(gunGroup);scene.add(camera);

function createUSP(){gunGroup.clear();gunGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.06,0.2,0.5),new THREE.MeshStandardMaterial({color:0x222222})));let h=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.2,0.12),new THREE.MeshStandardMaterial({color:0x444444}));h.position.y=-0.18;gunGroup.add(h);}
function createAK(){gunGroup.clear();gunGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.08,0.2,0.7),new THREE.MeshStandardMaterial({color:0x4a2800})));let m=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.3,0.08),new THREE.MeshStandardMaterial({color:0x333333}));m.position.y=-0.25;gunGroup.add(m);}
function createAWP(){gunGroup.clear();let b=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,1.2),new THREE.MeshStandardMaterial({color:0x1a4a00}));b.rotation.x=Math.PI/2;gunGroup.add(b);let s=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.3),new THREE.MeshStandardMaterial({color:0x111111}));s.position.y=0.1;gunGroup.add(s);}
createUSP();

const weapons={usp:{name:'USP-S',ammo:12,maxAmmo:24,damage:1,fireRate:150,model:createUSP},ak:{name:'AK-47',ammo:30,maxAmmo:90,damage:2,fireRate:100,model:createAK},awp:{name:'AWP',ammo:5,maxAmmo:15,damage:5,fireRate:1500,model:createAWP}};
let currentWeapon='usp',ammo=12,maxAmmo=24,canShoot=true,score=0,tomatoes=[],bombs=[],particles=[],grenades=[],money=800,hasArmor=false,grenadesCount=0;
let spawnInterval;

function switchWeapon(name){currentWeapon=name;ammo=weapons[name].ammo;maxAmmo=weapons[name].maxAmmo;weapons[name].model();updateHUD();updateAmmoDisplay2();
    document.querySelectorAll('.weapon-btn').forEach((b,i)=>{b.classList.toggle('active',['usp','ak','awp'].indexOf(name)===i);});}
function reload(){ammo=weapons[currentWeapon].ammo;maxAmmo-=weapons[currentWeapon].ammo;if(maxAmmo<0)maxAmmo=0;updateHUD();updateAmmoDisplay2();}
function updateHUD(){}
function updateAmmoDisplay2(){document.getElementById('ammoDisplay').textContent=ammo+'/'+maxAmmo;}

const crosshair=document.getElementById('crosshair');let mouseX=0,mouseY=0;
document.addEventListener('mousemove',e=>{crosshair.style.left=e.clientX+'px';crosshair.style.top=e.clientY+'px';mouseX=(e.clientX/window.innerWidth)*2-1;mouseY=-(e.clientY/window.innerHeight)*2+1;});
document.addEventListener('touchmove',e=>{crosshair.style.left=e.touches[0].clientX+'px';crosshair.style.top=e.touches[0].clientY+'px';mouseX=(e.touches[0].clientX/window.innerWidth)*2-1;mouseY=-(e.touches[0].clientY/window.innerHeight)*2+1;});

function createTomato(x,y,z){let g=new THREE.Group();g.add(new THREE.Mesh(new THREE.SphereGeometry(0.4,8,8),new THREE.MeshStandardMaterial({color:0xff4444})));g.position.set(x,y,z);scene.add(g);return{mesh:g,speed:0.03+Math.random()*0.08,hp:1};}
function createBomb(x,y,z){let g=new THREE.Group();g.add(new THREE.Mesh(new THREE.SphereGeometry(0.35,8,8),new THREE.MeshStandardMaterial({color:0x111111})));g.position.set(x,y,z);scene.add(g);return{mesh:g,speed:0.02+Math.random()*0.06};}
function createExplosion(pos,color){for(let i=0;i<10;i++){let p=new THREE.Mesh(new THREE.SphereGeometry(0.05,4,4),new THREE.MeshBasicMaterial({color:color}));p.position.copy(pos);p.velocity=new THREE.Vector3((Math.random()-0.5)*3,Math.random()*3,(Math.random()-0.5)*3);p.life=1;scene.add(p);particles.push(p);}}
function addKill(text){let f=document.getElementById('killfeed');let e=document.createElement('div');e.className='kill';e.textContent=text;f.appendChild(e);setTimeout(()=>e.remove(),3000);
    if(text.includes('🍅'))money+=100;if(text.includes('Золотой'))money+=500;if(text.includes('💣'))money-=50;}

function startSpawning(){spawnInterval=setInterval(()=>{let b=Math.random()<0.2;let x=(Math.random()-0.5)*18;let y=1+Math.random()*5;let z=-20-Math.random()*25;if(b)bombs.push(createBomb(x,y,z));else tomatoes.push(createTomato(x,y,z));},1000);}

document.addEventListener('click',()=>{if(!canShoot||ammo<=0)return;ammo--;canShoot=false;updateAmmoDisplay2();gunGroup.position.z=-0.75;setTimeout(()=>gunGroup.position.z=-0.7,100);let hit=false;
    for(let i=tomatoes.length-1;i>=0;i--){let t=tomatoes[i];let sp=t.mesh.position.clone().project(camera);if(Math.abs(sp.x-mouseX)<0.12&&Math.abs(sp.y-mouseY)<0.12){t.hp-=weapons[currentWeapon].damage;if(t.hp<=0){score+=10;document.getElementById('score').textContent=score;addKill('🍅 Томат');createExplosion(t.mesh.position,0xff4444);scene.remove(t.mesh);tomatoes.splice(i,1);}hit=true;break;}}
    if(!hit)for(let i=bombs.length-1;i>=0;i--){let b=bombs[i];let sp=b.mesh.position.clone().project(camera);if(Math.abs(sp.x-mouseX)<0.12&&Math.abs(sp.y-mouseY)<0.12){score-=5;document.getElementById('score').textContent=score;addKill('💣 Бомба');createExplosion(b.mesh.position,0xff0000);scene.remove(b.mesh);bombs.splice(i,1);hit=true;break;}}
    try{new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=').play();}catch(e){}setTimeout(()=>canShoot=true,weapons[currentWeapon].fireRate);});
document.addEventListener('touchstart',e=>{e.preventDefault();document.dispatchEvent(new Event('click'));});

function throwGrenade(){if(grenadesCount<=0){alert('❌ Нет гранат! Купи в 🛒');return;}grenadesCount--;let g=new THREE.Mesh(new THREE.SphereGeometry(0.15,8,8),new THREE.MeshStandardMaterial({color:0x334400}));g.position.copy(camera.position);g.velocity=new THREE.Vector3(0,0.3,-2);g.life=2;scene.add(g);grenades.push(g);setTimeout(()=>{if(g.parent){createExplosion(g.position,0xff8800);tomatoes.forEach(t=>{if(t.mesh.position.distanceTo(g.position)<5){t.hp-=3;if(t.hp<=0){score+=10;document.getElementById('score').textContent=score;addKill('💣 Граната');scene.remove(t.mesh);}}});tomatoes=tomatoes.filter(t=>t.hp>0);scene.remove(g);}},1500);}

let shootInterval;
function startShooting(){document.dispatchEvent(new Event('click'));shootInterval=setInterval(()=>document.dispatchEvent(new Event('click')),weapons[currentWeapon].fireRate);}
function stopShooting(){clearInterval(shootInterval);}

function moveObjects(){tomatoes.forEach(t=>{t.mesh.position.z+=t.speed;t.mesh.rotation.x+=0.02;});bombs.forEach(b=>{b.mesh.position.z+=b.speed;});tomatoes=tomatoes.filter(t=>{if(t.mesh.position.z>2){scene.remove(t.mesh);return false;}return true;});bombs=bombs.filter(b=>{if(b.mesh.position.z>2){scene.remove(b.mesh);return false;}return true;});}

function animate(){requestAnimationFrame(animate);moveObjects();particles.forEach(p=>{p.position.add(p.velocity.clone().multiplyScalar(0.1));p.velocity.y-=0.05;p.life-=0.02;p.scale.setScalar(p.life);});particles=particles.filter(p=>{if(p.life<=0){scene.remove(p);return false;}return true;});grenades.forEach(g=>{g.position.add(g.velocity.clone().multiplyScalar(0.3));g.velocity.y-=0.02;});renderer.render(scene,camera);}

startSpawning();animate();
updateAmmoDisplay2();

function openShop(){document.getElementById('shopOverlay').style.display='flex';document.getElementById('shopScore').textContent=money;}
function closeShop(){document.getElementById('shopOverlay').style.display='none';}
function buyWeapon(name){let prices={usp:0,ak:500,awp:1500};if(money>=prices[name]){money-=prices[name];switchWeapon(name);ammo=weapons[name].ammo;maxAmmo=weapons[name].maxAmmo;updateAmmoDisplay2();closeShop();}else alert('❌ Не хватает денег!');}
function buyGrenade(){if(money>=200){money-=200;grenadesCount++;alert('✅ Граната куплена!');closeShop();}else alert('❌ Нужно 200 💰');}
function buyArmor(){if(money>=300&&!hasArmor){money-=300;hasArmor=true;alert('🛡️ Броня куплена!');closeShop();}else alert(hasArmor?'❌ Броня уже есть!':'❌ Нужно 300 💰');}

setInterval(()=>{if(spawnInterval){let x=(Math.random()-0.5)*18;let y=1+Math.random()*5;tomatoes.push({mesh:(()=>{let g=new THREE.Group();g.add(new THREE.Mesh(new THREE.SphereGeometry(0.5,12,12),new THREE.MeshStandardMaterial({color:0xffaa00,emissive:0xff8800,emissiveIntensity:0.3})));g.position.set(x,y,-25);scene.add(g);return g;})(),speed:0.02,hp:2,golden:true});}},20000);

window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
</script>
</body>
</html>
