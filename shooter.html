<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍅 3D Томатный Тир</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:Arial;cursor:none;user-select:none}
        canvas{display:block}
        .ui{position:fixed;top:20px;left:0;right:0;text-align:center;z-index:10;pointer-events:none}
        .ui .score{font-size:50px;font-weight:bold;color:#ff8800;text-shadow:0 0 20px rgba(255,136,0,0.5)}
        .ui .lives{color:white;font-size:20px;margin-top:5px}
        .ui .combo{color:#ff4444;font-size:30px;font-weight:bold;margin-top:5px;height:30px}
        .crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;pointer-events:none;z-index:20}
        .overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:30;display:flex;align-items:center;justify-content:center;flex-direction:column}
        .overlay h1{color:#ff4444;font-size:36px;margin-bottom:20px}
        .overlay .final-score{color:#ff8800;font-size:60px;font-weight:bold;margin:20px 0}
        .overlay button{padding:15px 50px;background:#ff4444;color:white;border:none;border-radius:30px;font-size:20px;cursor:pointer;font-weight:bold}
    </style>
</head>
<body>
<div class="crosshair" id="crosshair">🔫</div>
<div class="ui">
    <div class="score" id="score">0</div>
    <div class="lives" id="lives">❤️❤️❤️</div>
    <div class="combo" id="combo"></div>
</div>
<div class="overlay" id="menuOverlay">
    <h1>🍅 3D Томатный Тир</h1>
    <p style="color:white;font-size:18px;margin-bottom:20px">Стреляй по томатам! Не стреляй по бомбам!</p>
    <button onclick="startGame()">🔫 НАЧАТЬ ИГРУ</button>
</div>
<div class="overlay" id="gameOverOverlay" style="display:none">
    <h1>💀 Игра окончена!</h1>
    <div class="final-score" id="finalScore">0</div>
    <button onclick="restartGame()">🔄 ИГРАТЬ ЕЩЁ</button>
</div>

<script>
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1a2e);
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,2,0);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(50,100),new THREE.MeshStandardMaterial({color:0x2a2a3e}));
floor.rotation.x=-Math.PI/2;floor.position.z=-30;scene.add(floor);

const sky=new THREE.Mesh(new THREE.SphereGeometry(80,32,32),new THREE.MeshBasicMaterial({color:0x0a0a2e,side:THREE.BackSide}));
scene.add(sky);

scene.add(new THREE.AmbientLight(0x404060,0.5));
const light=new THREE.DirectionalLight(0xff8866,1);
light.position.set(10,20,0);scene.add(light);

const gunGroup=new THREE.Group();
gunGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.1,0.3,0.6),new THREE.MeshStandardMaterial({color:0x333333})));
gunGroup.position.set(0.3,-0.3,-0.8);
camera.add(gunGroup);scene.add(camera);

let score=0,lives=3,gameActive=false,comboCount=0,tomatoes=[],bombs=[];

document.addEventListener('mousemove',(e)=>{
    document.getElementById('crosshair').style.left=e.clientX+'px';
    document.getElementById('crosshair').style.top=e.clientY+'px';
});

document.addEventListener('click',()=>{
    if(!gameActive)return;
    gunGroup.position.z=-0.7;setTimeout(()=>gunGroup.position.z=-0.8,100);
    for(let i=tomatoes.length-1;i>=0;i--){
        let t=tomatoes[i];
        let screenPos=t.mesh.position.clone().project(camera);
        let mouseX=(document.getElementById('crosshair').offsetLeft/window.innerWidth)*2-1;
        let mouseY=-(document.getElementById('crosshair').offsetTop/window.innerHeight)*2+1;
        if(Math.abs(screenPos.x-mouseX)<0.15&&Math.abs(screenPos.y-mouseY)<0.15){
            comboCount++;let bonus=comboCount>=10?3:comboCount>=5?2:1;
            score+=bonus;document.getElementById('score').textContent=score;
            scene.remove(t.mesh);tomatoes.splice(i,1);
            if(comboCount===5)document.getElementById('combo').textContent='🔥 x5!';
            if(comboCount===10)document.getElementById('combo').textContent='⚡ x10!';
            setTimeout(()=>document.getElementById('combo').textContent='',1000);
            return;
        }
    }
    for(let i=bombs.length-1;i>=0;i--){
        let b=bombs[i];
        let screenPos=b.mesh.position.clone().project(camera);
        let mouseX=(document.getElementById('crosshair').offsetLeft/window.innerWidth)*2-1;
        let mouseY=-(document.getElementById('crosshair').offsetTop/window.innerHeight)*2+1;
        if(Math.abs(screenPos.x-mouseX)<0.15&&Math.abs(screenPos.y-mouseY)<0.15){
            lives--;document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,lives));
            comboCount=0;scene.remove(b.mesh);bombs.splice(i,1);
            if(lives<=0)endGame();return;
        }
    }
    comboCount=0;
});

function createTomato(x,y,z){
    let g=new THREE.Group();
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),new THREE.MeshStandardMaterial({color:0xff4444})));
    g.position.set(x,y,z);scene.add(g);
    return{mesh:g,speed:0.05+Math.random()*0.1};
}

function createBomb(x,y,z){
    let g=new THREE.Group();
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.4,8,8),new THREE.MeshStandardMaterial({color:0x111111})));
    g.position.set(x,y,z);scene.add(g);
    return{mesh:g,speed:0.03+Math.random()*0.1};
}

let spawnInterval;
function startSpawning(){
    spawnInterval=setInterval(()=>{
        if(!gameActive)return;
        let isBomb=Math.random()<0.2;
        let x=(Math.random()-0.5)*15;
        let y=1+Math.random()*5;
        let z=-15-Math.random()*15;
        if(isBomb)bombs.push(createBomb(x,y,z));
        else tomatoes.push(createTomato(x,y,z));
    },1200);
}

function moveObjects(){
    for(let i=tomatoes.length-1;i>=0;i--){
        tomatoes[i].mesh.position.z+=tomatoes[i].speed;
        tomatoes[i].mesh.rotation.x+=0.03;
        if(tomatoes[i].mesh.position.z>2){
            lives--;document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,lives));
            scene.remove(tomatoes[i].mesh);tomatoes.splice(i,1);
            if(lives<=0)endGame();
        }
    }
    for(let i=bombs.length-1;i>=0;i--){
        bombs[i].mesh.position.z+=bombs[i].speed;
        if(bombs[i].mesh.position.z>2){scene.remove(bombs[i].mesh);bombs.splice(i,1);}
    }
}

function startGame(){
    score=0;lives=3;gameActive=true;comboCount=0;
    document.getElementById('score').textContent='0';
    document.getElementById('lives').textContent='❤️❤️❤️';
    document.getElementById('combo').textContent='';
    document.getElementById('menuOverlay').style.display='none';
    document.getElementById('gameOverOverlay').style.display='none';
    tomatoes.forEach(t=>scene.remove(t.mesh));
    bombs.forEach(b=>scene.remove(b.mesh));
    tomatoes=[];bombs=[];
    startSpawning();
    setInterval(()=>{if(gameActive)moveObjects();},30);
}

function endGame(){
    gameActive=false;clearInterval(spawnInterval);
    document.getElementById('finalScore').textContent=score;
    document.getElementById('gameOverOverlay').style.display='flex';
}

function restartGame(){startGame();}

function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();

window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

document.getElementById('menuOverlay').style.display='flex';
</script>
</body>
    </html>
