<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ TomatiK vs Chef - 2D</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#1a1a2e;overflow:hidden;font-family:Arial;height:100vh;user-select:none;touch-action:manipulation}
        canvas{display:block}
        .ui{position:fixed;top:15px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;color:white;font-size:20px}
        .lives{display:flex;justify-content:center;gap:60px;margin-top:10px}
        .p-lives{color:#4488ff;font-size:22px}.b-lives{color:#ff4444;font-size:22px}
        .msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;font-weight:bold;pointer-events:none;z-index:20;display:none;text-align:center}
        .msg.show{display:block}.win{color:#ffaa00}.lose{color:#ff0000}
        .btn{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);padding:15px 40px;background:#ff4444;color:white;border:none;border-radius:25px;font-size:18px;cursor:pointer;z-index:30;display:none}
        .btn.show{display:block}
    </style>
</head>
<body>
<canvas id="g"></canvas>
<div class="ui"><div>⚔️ TomatiK vs Chef</div><div class="lives"><div class="p-lives" id="pl">👑 ❤️❤️❤️</div><div class="b-lives" id="bl">🍅 ❤️❤️❤️</div></div></div>
<div class="msg" id="msg"></div><button class="btn" id="rb" onclick="rst()">🔄 РЕВАНШ!</button>

<script>
const c=document.getElementById('g'),ctx=c.getContext('2d');
c.width=innerWidth;c.height=innerHeight;
let px=100,py=c.height/2,bx=c.width-100,by=c.height/2,pl=3,bl=3,ga=true;
let pt=[],bt=[],bs=0;
let keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key===' '||e.key==='Spacebar'){e.preventDefault();shootP();}});
document.addEventListener('keyup',e=>{keys[e.key]=false});
c.addEventListener('click',shootP);
c.addEventListener('touchstart',e=>{e.preventDefault();shootP();});

function shootP(){
    if(!ga)return;
    pt.push({x:px+30,y:py,vx:8,vy:(by-py)*0.05});
}
function shootB(){
    if(!ga)return;
    bt.push({x:bx-30,y:by,vx:-8,vy:(py-by)*0.05+Math.random()*2-1});
}
function updateUI(){document.getElementById('pl').textContent='👑 '+'❤️'.repeat(Math.max(0,pl));document.getElementById('bl').textContent='🍅 '+'❤️'.repeat(Math.max(0,bl));}
function end(w){
    ga=false;let m=document.getElementById('msg');m.classList.add('show');
    m.textContent=w==='p'?'👑 ШЕФ ПОБЕДИЛ!':'🍅 ТОМАТИК ПОБЕДИЛ!';
    m.className='msg show '+(w==='p'?'win':'lose');document.getElementById('rb').classList.add('show');
}
function rst(){pl=3;bl=3;ga=true;pt=[];bt=[];px=100;py=c.height/2;bx=c.width-100;by=c.height/2;document.getElementById('msg').classList.remove('show');document.getElementById('rb').classList.remove('show');updateUI();}

function loop(){
    ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,c.width,c.height);
    if(ga){
        let s=5;if(keys['w']||keys['ArrowUp'])py-=s;if(keys['s']||keys['ArrowDown'])py+=s;
        if(keys['a']||keys['ArrowLeft'])px-=s;if(keys['d']||keys['ArrowRight'])px+=s;
        py=Math.max(30,Math.min(c.height-30,py));px=Math.max(30,Math.min(c.width/2-50,px));
        let dx=px-bx,dy=py-by,dist=Math.hypot(dx,dy);
        if(dist>200){bx+=dx*0.02;by+=dy*0.02;}if(dist<150){bx-=dx*0.02;by-=dy*0.02;}
        by=Math.max(30,Math.min(c.height-30,by));bx=Math.max(c.width/2+50,Math.min(c.width-30,bx));
        bs++;if(bs>40){shootB();bs=0;}
        pt.forEach((t,i)=>{t.x+=t.vx;t.y+=t.vy;let d=Math.hypot(t.x-bx,t.y-by);if(d<30){bl--;pt.splice(i,1);updateUI();if(bl<=0)end('p');}if(t.x>c.width||t.x<0||t.y>c.height||t.y<0)pt.splice(i,1);});
        bt.forEach((t,i)=>{t.x+=t.vx;t.y+=t.vy;let d=Math.hypot(t.x-px,t.y-py);if(d<30){pl--;bt.splice(i,1);updateUI();if(pl<=0)end('b');}if(t.x>c.width||t.x<0||t.y>c.height||t.y<0)bt.splice(i,1);});
    }
    ctx.fillStyle='#4488ff';ctx.beginPath();ctx.arc(px,py,30,0,Math.PI*2);ctx.fill();ctx.font='30px Arial';ctx.fillText('👑',px-20,py+12);
    ctx.fillStyle='#ff4444';ctx.beginPath();ctx.arc(bx,by,30,0,Math.PI*2);ctx.fill();ctx.font='30px Arial';ctx.fillText('🍅',bx-20,by+12);
    ctx.fillStyle='#ff4444';pt.forEach(t=>{ctx.beginPath();ctx.arc(t.x,t.y,10,0,Math.PI*2);ctx.fill();});
    ctx.fillStyle='#4488ff';bt.forEach(t=>{ctx.beginPath();ctx.arc(t.x,t.y,10,0,Math.PI*2);ctx.fill();});
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.setLineDash([10,10]);ctx.beginPath();ctx.moveTo(c.width/2,0);ctx.lineTo(c.width/2,c.height);ctx.stroke();ctx.setLineDash([]);
    requestAnimationFrame(loop);
}
updateUI();loop();
addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight;});
</script>
</body>
</html>
